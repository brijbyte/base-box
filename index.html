<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Base Box</title>
    <!-- Anti-FOUC: apply a persisted theme override before first paint. -->
    <script>
      try {
        var r = document.documentElement;
        var t = localStorage.getItem('base-box-theme');
        if (t === 'light' || t === 'dark') r.setAttribute('data-theme', t);
        var d = localStorage.getItem('base-box-dark-theme');
        if (d) r.setAttribute('data-dark-theme', d);
        var l = localStorage.getItem('base-box-light-theme');
        if (l) r.setAttribute('data-light-theme', l);
      } catch (e) {}
    </script>
    <!-- Anti-flash: hydrate stored pane sizes (percent → px) before first paint.
       Defaults/key/gutter width must mirror src/resize.ts. -->
    <script>
      try {
        var raw = localStorage.getItem('base-box-pane-sizes');
        var s = raw ? JSON.parse(raw) : null;
        if (
          !s ||
          typeof s.sidebar !== 'number' ||
          typeof s.editor !== 'number' ||
          typeof s.preview !== 'number'
        )
          s = { sidebar: 18, editor: 41, preview: 41 };
        var space = document.documentElement.clientWidth - 2; // minus the two 1px gutters
        var sidebar = (s.sidebar / 100) * space,
          editor = (s.editor / 100) * space;
        if (sidebar > 360) {
          editor += sidebar - 360;
          sidebar = 360;
        } // cap file-tree width
        var rs = document.documentElement.style;
        rs.setProperty('--col-sidebar', sidebar + 'px');
        rs.setProperty('--col-editor', editor + 'px');
        rs.setProperty('--col-preview', (s.preview / 100) * space + 'px');
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
