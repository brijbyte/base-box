<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>base-box</title>
    <!-- Anti-FOUC: apply a persisted theme override before first paint. -->
    <script>
      try {
        var t = localStorage.getItem('base-box-theme');
        if (t === 'light' || t === 'dark')
          document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
    <style>
      /* Light (default + explicit override) */
      :root,
      :root[data-theme='light'] {
        color-scheme: light;
        --bg: #ffffff;
        --fg: #1f2328;
        --header-bg: #0d1117;
        --header-fg: #e6edf3;
        --bar-bg: #f6f8fa;
        --border: #d0d7de;
        --muted: #656d76;
        --control-bg: #ffffff;
        --control-fg: #1f2328;
      }
      /* Dark via system preference (unless explicitly overridden to light) */
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme='light']) {
          color-scheme: dark;
          --bg: #0d1117;
          --fg: #e6edf3;
          --header-bg: #010409;
          --header-fg: #e6edf3;
          --bar-bg: #161b22;
          --border: #30363d;
          --muted: #8b949e;
          --control-bg: #21262d;
          --control-fg: #e6edf3;
        }
      }
      /* Dark via explicit override */
      :root[data-theme='dark'] {
        color-scheme: dark;
        --bg: #0d1117;
        --fg: #e6edf3;
        --header-bg: #010409;
        --header-fg: #e6edf3;
        --bar-bg: #161b22;
        --border: #30363d;
        --muted: #8b949e;
        --control-bg: #21262d;
        --control-fg: #e6edf3;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font:
          14px/1.4 ui-monospace,
          monospace;
        background: var(--bg);
        color: var(--fg);
      }

      #app {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        height: 100%;
      }

      header {
        grid-column: 1 / 3;
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 8px 12px;
        background: var(--header-bg);
        color: var(--header-fg);
      }

      header strong {
        font-size: 16px;
      }

      #status {
        margin-left: auto;
        color: var(--muted);
      }

      .pane {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }

      .pane > .bar {
        padding: 6px 10px;
        background: var(--bar-bg);
        border-bottom: 1px solid var(--border);
        color: var(--fg);
      }

      #editor {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        background: var(--bg);
      }
      #editor .cm-editor {
        height: 100%;
      }
      #editor .cm-scroller {
        font:
          13px/1.5 ui-monospace,
          monospace;
      }

      #preview {
        flex: 1;
        border: 0;
        background: #fff;
      }

      .pane.editor {
        border-right: 1px solid var(--border);
      }

      button,
      select {
        font: inherit;
        background: var(--control-bg);
        color: var(--control-fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 2px 8px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <header>
        <strong>base-box</strong>
        <button id="share">Share URL</button>
        <button id="theme" title="Toggle color theme">Theme: System</button>
        <span id="status"></span>
      </header>
      <div class="pane editor">
        <div class="bar"><select id="files"></select></div>
        <div id="editor"></div>
      </div>
      <div class="pane">
        <div class="bar">preview</div>
        <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
