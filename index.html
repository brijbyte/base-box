<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>base-box</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font:
          14px/1.4 ui-monospace,
          monospace;
      }

      #app {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        height: 100%;
      }

      header {
        grid-column: 1 / 3;
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 8px 12px;
        background: #111;
        color: #eee;
      }

      header strong {
        font-size: 16px;
      }

      #status {
        margin-left: auto;
        opacity: 0.7;
      }

      .pane {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }

      .pane > .bar {
        padding: 6px 10px;
        background: #f3f3f3;
        border-bottom: 1px solid #ddd;
      }

      #editor {
        flex: 1;
        border: 0;
        padding: 10px;
        resize: none;
        font:
          13px/1.5 ui-monospace,
          monospace;
        outline: none;
      }

      #preview {
        flex: 1;
        border: 0;
        background: #fff;
      }

      .pane.editor {
        border-right: 1px solid #ddd;
      }

      button,
      select {
        font: inherit;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <header>
        <strong>base-box</strong>
        <button id="share">Share URL</button>
        <span id="status"></span>
      </header>
      <div class="pane editor">
        <div class="bar"><select id="files"></select></div>
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
      <div class="pane">
        <div class="bar">preview</div>
        <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
