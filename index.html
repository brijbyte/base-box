<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Base Box</title>
    <!-- Anti-FOUC: apply a persisted theme override before first paint. -->
    <script>
      try {
        var r = document.documentElement;
        var t = localStorage.getItem('base-box-theme');
        if (t === 'light' || t === 'dark') r.setAttribute('data-theme', t);
        var d = localStorage.getItem('base-box-dark-theme');
        if (d) r.setAttribute('data-dark-theme', d);
        var l = localStorage.getItem('base-box-light-theme');
        if (l) r.setAttribute('data-light-theme', l);
      } catch (e) {}
    </script>
    <!-- Anti-flash: restore persisted pane sizes before the body is even parsed. The layout
       is `{ panelId: percent }`. We expose each as a `--fg-<id>` CSS var on <html> now (this
       runs during head parse, before the panels exist); styles.css consumes them so the very
       first paint already has the restored sizes, matching what hydration computes — no shift.
       See the `#pane-*` rules in styles.css for how they're applied. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('base-box-panes');
          if (!raw) return;
          var layout = JSON.parse(raw);
          var r = document.documentElement;
          for (var id in layout) {
            if (!/^[a-zA-Z][\w-]*$/.test(id)) continue; // guard the var name
            r.style.setProperty('--fg-' + id, String(Number(layout[id])));
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/src/global.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
