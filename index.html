<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Base Box</title>
    <!-- Anti-FOUC: apply a persisted theme override before first paint. -->
    <script>
      try {
        var r = document.documentElement;
        var t = localStorage.getItem('base-box-theme');
        if (t === 'light' || t === 'dark') r.setAttribute('data-theme', t);
        var d = localStorage.getItem('base-box-dark-theme');
        if (d) r.setAttribute('data-dark-theme', d);
        var l = localStorage.getItem('base-box-light-theme');
        if (l) r.setAttribute('data-light-theme', l);
      } catch (e) {}
    </script>
    <!-- Anti-flash: restore persisted pane sizes onto the prerendered panels before paint.
       The layout is `{ panelId: percent }`; react-resizable-panels sizes a panel via
       `flex: <percent> 1 0px`, so we set that (matching what hydration will compute). -->
    <script>
      (function () {
        function restorePanes() {
          try {
            var raw = localStorage.getItem('base-box-panes');
            if (!raw) return;
            var layout = JSON.parse(raw);
            for (var id in layout) {
              var el = document.getElementById(id);
              if (el && el.hasAttribute('data-panel'))
                el.style.flex = layout[id] + ' 1 0px';
            }
          } catch (e) {}
        }
        // The panels are in the (prerendered) body, parsed after this head script — run
        // once the DOM is ready, before the browser's first paint of #app.
        if (document.readyState === 'loading')
          document.addEventListener('DOMContentLoaded', restorePanes);
        else restorePanes();
      })();
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
